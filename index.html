<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium Healthcare - Your Family's Health Starts Here. World-class medical and dental care with state-of-the-art facilities." />
    <meta name="keywords" content="healthcare, medical clinic, dental care, premium healthcare, family health" />
    <title>MediLux Premium Healthcare | Medical & Dental Clinic</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      html {
        scroll-behavior: smooth;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #ffffff;
        color: #1f2937;
        overflow-x: hidden;
      }
      
      .dark body {
        background: #0f172a;
        color: #f1f5f9;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      
      .dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #059669, #14b8a6);
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #047857, #0d9488);
      }
      
      /* Selection */
      ::selection {
        background: rgba(5, 150, 105, 0.2);
        color: #059669;
      }
      
      .dark ::selection {
        background: rgba(5, 150, 105, 0.3);
        color: #6ee7b7;
      }
      
      /* Floating Animation */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      .floating {
        animation: float 6s ease-in-out infinite;
      }
      
      .floating-delayed {
        animation: float 6s ease-in-out 3s infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
